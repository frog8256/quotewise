<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuoteWise Preview</title>
    <style>
      :root {
        --background: #ffffff;
        --foreground: #1e293b;
        --primary: #2563eb;
        --muted-foreground: #64748b;
        --accent: #dbeafe;
        --border: #e2e8f0;
        --destructive: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--foreground);
        background: var(--background);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      header {
        border-bottom: 1px solid var(--border);
        background: #ffffff;
      }

      .container {
        width: min(100% - 48px, 1280px);
        margin: 0 auto;
      }

      .header-inner {
        padding: 20px 0;
      }

      .logo {
        height: 40px;
        width: auto;
      }

      main {
        padding: 64px 0;
      }

      .hero {
        max-width: 768px;
        margin: 0 auto 64px;
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 5vw, 44px);
        line-height: 1.25;
        font-weight: 650;
      }

      .hero p {
        margin: 0;
        color: var(--muted-foreground);
        font-size: 18px;
        line-height: 1.7;
      }

      .upload-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        margin-bottom: 32px;
      }

      .upload-card {
        display: block;
        min-height: 188px;
        padding: 32px;
        border: 2px dashed var(--border);
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        transition:
          background-color 160ms ease,
          border-color 160ms ease;
      }

      .upload-card:hover,
      .upload-card.has-file {
        border-color: var(--primary);
        background: color-mix(in srgb, var(--accent) 55%, white);
      }

      .upload-content {
        display: flex;
        min-height: 120px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .icon {
        width: 48px;
        height: 48px;
        color: var(--muted-foreground);
      }

      .has-file .icon {
        color: var(--primary);
      }

      .upload-title {
        margin: 0 0 4px;
        font-weight: 600;
      }

      .upload-help {
        margin: 0;
        color: var(--muted-foreground);
        font-size: 14px;
      }

      .error {
        display: none;
        margin: 0 0 24px;
        color: var(--destructive);
        text-align: center;
        font-size: 14px;
      }

      .actions {
        text-align: center;
      }

      button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 48px;
        padding: 12px 28px;
        border: 0;
        border-radius: 10px;
        color: #ffffff;
        background: var(--primary);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .features {
        border-top: 1px solid var(--border);
        padding: 64px 0 0;
      }

      .feature-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 32px;
      }

      .feature {
        text-align: center;
      }

      .feature-icon {
        display: inline-flex;
        width: 48px;
        height: 48px;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        border-radius: 10px;
        color: var(--primary);
        background: color-mix(in srgb, var(--primary) 10%, white);
      }

      .feature h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .feature p {
        margin: 0;
        color: var(--muted-foreground);
        font-size: 14px;
        line-height: 1.6;
      }

      input[type="file"] {
        display: none;
      }

      @media (max-width: 760px) {
        .container {
          width: min(100% - 32px, 1280px);
        }

        main {
          padding: 48px 0;
        }

        .upload-grid,
        .feature-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container header-inner">
        <svg
          viewBox="0 0 400 140"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="logo"
          aria-label="QuoteWise"
        >
          <circle cx="60" cy="70" r="28" stroke="#1e3a5f" stroke-width="10" fill="none"></circle>
          <line x1="80" y1="88" x2="92" y2="100" stroke="#1e3a5f" stroke-width="10" stroke-linecap="round"></line>
          <path d="M100 55 L108 95 L116 65 L124 95 L132 55" stroke="#2563eb" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
          <text x="165" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e3a5f">
            Quote<tspan fill="#2563eb">Wise</tspan>
          </text>
        </svg>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>견적서 비교 분석을 쉽고 빠르게</h1>
        <p>두 개의 PDF 견적서를 업로드하면 AI가 항목별 가격, 조건, 차이점을 자동으로 분석해드립니다.</p>
      </section>

      <section class="upload-grid" aria-label="견적서 업로드">
        <label class="upload-card" id="card-1" for="file-1">
          <input id="file-1" type="file" accept="application/pdf" />
          <div class="upload-content">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" x2="12" y1="3" y2="15"></line>
            </svg>
            <div>
              <p class="upload-title" id="title-1">첫 번째 견적서 업로드</p>
              <p class="upload-help" id="help-1">PDF 파일을 선택하거나 여기에 끌어다 놓으세요.</p>
            </div>
          </div>
        </label>

        <label class="upload-card" id="card-2" for="file-2">
          <input id="file-2" type="file" accept="application/pdf" />
          <div class="upload-content">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" x2="12" y1="3" y2="15"></line>
            </svg>
            <div>
              <p class="upload-title" id="title-2">두 번째 견적서 업로드</p>
              <p class="upload-help" id="help-2">PDF 파일을 선택하거나 여기에 끌어다 놓으세요.</p>
            </div>
          </div>
        </label>
      </section>

      <p class="error" id="error">PDF 파일만 업로드할 수 있습니다.</p>

      <div class="actions">
        <button id="analyze" disabled>
          비교 분석 시작하기
          <span aria-hidden="true">→</span>
        </button>
      </div>

      <section class="features">
        <div class="feature-grid">
          <article class="feature">
            <div class="feature-icon">□</div>
            <h2>자동 항목 추출</h2>
            <p>AI가 견적서의 주요 항목과 가격 정보를 자동으로 추출합니다.</p>
          </article>
          <article class="feature">
            <div class="feature-icon">✓</div>
            <h2>항목별 비교</h2>
            <p>유사 항목을 자동으로 매칭해 정확한 비교 결과를 제공합니다.</p>
          </article>
          <article class="feature">
            <div class="feature-icon">→</div>
            <h2>의사결정 지원</h2>
            <p>가격 차이와 조건 차이를 한눈에 파악할 수 있습니다.</p>
          </article>
        </div>
      </section>
    </main>

    <script>
      const files = { 1: null, 2: null };
      const analyze = document.querySelector("#analyze");
      const error = document.querySelector("#error");

      function handleFile(index, event) {
        const file = event.target.files[0];
        if (!file) return;

        if (file.type !== "application/pdf") {
          error.style.display = "block";
          event.target.value = "";
          return;
        }

        error.style.display = "none";
        files[index] = file;
        document.querySelector(`#card-${index}`).classList.add("has-file");
        document.querySelector(`#title-${index}`).textContent = `견적서 ${index}`;
        document.querySelector(`#help-${index}`).textContent = file.name;
        analyze.disabled = !(files[1] && files[2]);
      }

      document.querySelector("#file-1").addEventListener("change", (event) => handleFile(1, event));
      document.querySelector("#file-2").addEventListener("change", (event) => handleFile(2, event));
      analyze.addEventListener("click", () => {
        if (files[1] && files[2]) {
          console.log("분석 시작:", files[1].name, files[2].name);
        }
      });
    </script>
  </body>
</html>
